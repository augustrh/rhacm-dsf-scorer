<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSF Placement Scores</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 400;
    color: #888;
    margin-bottom: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #555;
    margin-bottom: 3rem;
  }
  .clusters {
    display: flex;
    gap: 3rem;
    align-items: flex-end;
    min-height: 420px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .cluster {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 160px;
  }
  .score-value {
    font-size: 2.8rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    transition: color 0.5s;
  }
  .bar-container {
    width: 100%;
    height: 300px;
    background: #16213e;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    border: 1px solid #2a2a4a;
  }
  .bar {
    position: absolute;
    bottom: 0;
    width: 100%;
    border-radius: 0 0 7px 7px;
    transition: height 1s ease, background 1s ease;
  }
  .cluster-name {
    margin-top: 1rem;
    font-size: 1rem;
    font-weight: 600;
    color: #ccc;
  }
  .region {
    font-size: 0.75rem;
    color: #666;
    margin-top: 0.25rem;
  }
  .winner .score-value { color: #00ff88; }
  .winner .bar { box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); }
  .status {
    margin-top: 3rem;
    font-size: 0.75rem;
    color: #444;
  }
  .legend {
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: #555;
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>

<h1>Placement Scores</h1>
<div class="subtitle">Dynamic Scoring Framework &mdash; Live</div>

<div class="clusters" id="clusters"></div>

<div class="legend">
  Higher score = more capacity + region preference<br>
  Placement routes workloads to the highest-scoring cluster
</div>

<div class="status" id="status">Waiting for data...</div>

<script>
function scoreColor(score, isWinner) {
  if (isWinner) return '#00ff88';
  if (score >= 80) return '#4CAF50';
  if (score >= 60) return '#FFC107';
  if (score >= 40) return '#FF9800';
  return '#F44336';
}

function update(data) {
  const container = document.getElementById('clusters');
  const byCluster = {};

  data.forEach(d => {
    byCluster[d.cluster] = { score: d.score, dimension: d.dimension };
  });

  const clusterNames = Object.keys(byCluster);
  const winnerCluster = clusterNames.length > 0
    ? clusterNames.reduce((a, b) => byCluster[a].score >= byCluster[b].score ? a : b)
    : null;

  // Build or update DOM elements dynamically
  const existing = new Set();
  clusterNames.forEach(name => {
    existing.add(name);
    let el = document.getElementById('c-' + name);
    if (!el) {
      el = document.createElement('div');
      el.className = 'cluster';
      el.id = 'c-' + name;
      el.innerHTML =
        '<div class="score-value" id="v-' + name + '">--</div>' +
        '<div class="bar-container"><div class="bar" id="b-' + name + '"></div></div>' +
        '<div class="cluster-name">' + name + '</div>' +
        '<div class="region" id="r-' + name + '"></div>';
      container.appendChild(el);
    }

    const info = byCluster[name];
    const isWinner = name === winnerCluster;
    const pct = (info.score / 100) * 100;

    document.getElementById('v-' + name).textContent = Math.round(info.score);
    const bar = document.getElementById('b-' + name);
    bar.style.height = pct + '%';
    bar.style.background = scoreColor(info.score, isWinner);
    document.getElementById('r-' + name).textContent = info.dimension;

    el.classList.toggle('winner', isWinner);
  });

  // Remove clusters that disappeared from the data
  Array.from(container.children).forEach(child => {
    const name = child.id.replace('c-', '');
    if (!existing.has(name)) container.removeChild(child);
  });

  document.getElementById('status').textContent =
    'Last update: ' + new Date().toLocaleTimeString();
}

function poll() {
  fetch('scores.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      update(data);
      setTimeout(poll, 5000);
    })
    .catch(() => {
      document.getElementById('status').textContent =
        'Waiting for data... (run: bash scripts/dashboard.sh)';
      setTimeout(poll, 3000);
    });
}

poll();
</script>
</body>
</html>
